version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: leads_postgres
    restart: always
    environment:
      POSTGRES_DB: leads_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: leads_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  mock-api:
    build: ./mock-api
    container_name: leads_mock_api
    ports:
      - "3001:3001"
    restart: always

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: leads_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

volumes:
  pgdata:
  ollama_data: